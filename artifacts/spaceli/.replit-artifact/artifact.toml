kind = "web"
previewPath = "/"
title = "Spaceli"
version = "1.0.0"
id = "artifacts/spaceli"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18362

[services.development]
run = "pnpm --filter @workspace/spaceli run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spaceli", "run", "build" ]
publicDir = "artifacts/spaceli/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18362"
BASE_PATH = "/"
